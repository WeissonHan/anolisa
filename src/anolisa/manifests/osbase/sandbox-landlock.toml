[component]
name = "sandbox-landlock"
version = "0.1.0"
layer = "osbase"
description = "Landlock LSM — unprivileged filesystem access control for Agent sandboxing"

[install]
modes = ["system"]

[environment]
requires_os = "linux"
requires_kernel = ">=5.13"

[environment.requires_env]
landlock_abi = ">=1"
