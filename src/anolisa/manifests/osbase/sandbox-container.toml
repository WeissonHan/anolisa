[component]
name = "sandbox-container"
version = "0.1.0"
layer = "osbase"
description = "Container runtime substrate — runc/crun based OCI container execution"

[install]
modes = ["system"]

[environment]
requires_os = "linux"
requires_kernel = ">=4.18"

[environment.requires_env]
cgroups_v2 = "true"
namespaces = "true"

[dependencies]
runtime = ["containerd", "runc"]
