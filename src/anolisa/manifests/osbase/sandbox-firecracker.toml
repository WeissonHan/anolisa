[component]
name = "sandbox-firecracker"
version = "0.1.0"
layer = "osbase"
description = "Firecracker microVM — minimal-overhead VM isolation for Agent workloads"

[install]
modes = ["system"]

[environment]
requires_os = "linux"
requires_arch = ["x86_64", "aarch64"]
requires_kernel = ">=4.14"

[environment.requires_env]
kvm_available = "true"

[dependencies]
runtime = ["firecracker"]
