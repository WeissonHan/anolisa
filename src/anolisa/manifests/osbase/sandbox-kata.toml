[component]
name = "sandbox-kata"
version = "0.1.0"
layer = "osbase"
description = "Kata Containers — lightweight VM-based container isolation"

[install]
modes = ["system"]

[environment]
requires_os = "linux"
requires_arch = ["x86_64", "aarch64"]
requires_kernel = ">=5.4"

[environment.requires_env]
kvm_available = "true"

[dependencies]
runtime = ["kata-runtime", "qemu-kvm"]
components = ["sandbox-container"]
