[capability]
name = "workspace-checkpoint"
description = "Agent workspace snapshot and restore"

[implementation]
components = ["ws-ckpt"]
# Storage backend selected per environment; btrfs preferred when available.
features."ws-ckpt" = ["btrfs_loop", "overlayfs"]

[requires_env]
os = "linux"
arch = ["x86_64", "aarch64"]
kernel = ">=5.4"
